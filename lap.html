<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/lap.css">
    <link rel="stylesheet" href="css/responsev.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="imgs/tap.ico">
    <meta property="og:image" content="imgs/icon.png">
    <meta property="og:image:width" content="500">
    <meta property="og:image:height" content="500">
    <link rel="canonical" href="https://alg0rithm.dev/" />
    <meta name="theme-color" content="#4A90E2">
    <meta property="og:locale" content="en_US">
    <title>Alg0rithm | Lap</title>
</head>
<body>
    <button id="sidebarToggle" class="sidebar-toggle-btn d-lg-none" type="button">
        <i class="fa fa-bars"></i>
    </button>
    
    <div id="sidebarBackdrop" class="sidebar-backdrop d-lg-none"></div>
    
    <div class="d-flex docs-layout">
        <aside id="docsSidebar" class="sidebar p-3 docs-sidebar">
            <div class="accordion accordion-flush mt-2" id="sidebarAccordion">
                
                <div class="accordion-item" style="background-color: var(--bg-card); border: none;">
                    <h2 class="accordion-header">
                        <button class="accordion-button" style="background-color: var(--bg-card); color: var(--text); border: none; box-shadow: none;" type="button" data-bs-toggle="collapse" data-bs-target="#sortingAlgos">
                            Sorting 
                        </button>
                    </h2>
                    <div id="sortingAlgos" class="accordion-collapse collapse show" data-bs-parent="#sidebarAccordion">
                        <div class="accordion-body p-0">
                            <a href="?=1" onclick="start('1'); return false;" class="d-block text-decoration-none p-2 ps-4" style="color: var(--text-gray);">Bubble Sort</a>
                            <a href="?=2" onclick="start('2'); return false;" class="d-block text-decoration-none p-2 ps-4" style="color: var(--text-gray);">Selection Sort</a>
                            <a href="?=3" onclick="start('3'); return false;" class="d-block text-decoration-none p-2 ps-4" style="color: var(--text-gray);">Insertion Sort</a>
                            <a href="?=4" onclick="start('4'); return false;" class="d-block text-decoration-none p-2 ps-4" style="color: var(--text-gray);">Quick Sort</a>
                            <a href="?=5" onclick="start('5'); return false;" class="d-block text-decoration-none p-2 ps-4" style="color: var(--text-gray);">Merge Sort</a>
                            <a href="?=6" onclick="start('6'); return false;" class="d-block text-decoration-none p-2 ps-4" style="color: var(--text-gray);">Heap Sort</a>
                            <a href="?=7" onclick="start('7'); return false;" class="d-block text-decoration-none p-2 ps-4" style="color: var(--text-gray);">Shell Sort</a>
                        </div>
                    </div>
                </div>
    
                <div class="accordion-item" style="background-color: var(--bg-card); border: none;">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" style="background-color: var(--bg-card); color: var(--text); border: none; box-shadow: none;" type="button" data-bs-toggle="collapse" data-bs-target="#searchingAlgos">
                            Searching 
                        </button>
                    </h2>
                    <div id="searchingAlgos" class="accordion-collapse collapse" data-bs-parent="#sidebarAccordion">
                        <div class="accordion-body p-0">
                            <a href="?=b1" onclick="start('b1'); return false;" class="d-block text-decoration-none p-2 ps-4" style="color: var(--text-gray);">Binary Search</a>
                            <a href="?=b2" onclick="start('b2'); return false;" class="d-block text-decoration-none p-2 ps-4" style="color: var(--text-gray);">Jump Search</a>
                            <a href="?=b3" onclick="start('b3'); return false;" class="d-block text-decoration-none p-2 ps-4" style="color: var(--text-gray);">Interpolation Search</a>
                            <a href="?=b4" onclick="start('b4'); return false;" class="d-block text-decoration-none p-2 ps-4" style="color: var(--text-gray);">Linear Search</a>
                        </div>
                    </div>
                </div>
    
            </div>
        </aside>
    </div>

    <div class="container">
        <div class="bar-wrapper"><span class="num">38</span><div class="rec" style="height: 123px;"></div></div>
        <div class="bar-wrapper"><span class="num">27</span><div class="rec" style="height: 87px;"></div></div>
        <div class="bar-wrapper"><span class="num">43</span><div class="rec" style="height: 139px;"></div></div>
        <div class="bar-wrapper"><span class="num">3</span><div class="rec" style="height: 9px;"></div></div>
        <div class="bar-wrapper"><span class="num">9</span><div class="rec" style="height: 29px;"></div></div>
        <div class="bar-wrapper"><span class="num">82</span><div class="rec" style="height: 241px;"></div></div>
        <div class="bar-wrapper"><span class="num">10</span><div class="rec" style="height: 32px;"></div></div>
    </div>

    <div class="buttons-con">

        <button class="btnL btn">
            <i class="fa-solid fa-arrow-left"></i>
        </button>

        <button class="btns btn">
            <i class="fa-solid fa-play"></i>
        </button>

        <button class="btnR btn">
            <i class="fa-solid fa-arrow-right"></i>
        </button>

    </div>

    <script src="js/lap.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
