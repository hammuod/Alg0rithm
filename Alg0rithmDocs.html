<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=hi, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.min.css">
    <link rel="stylesheet" href="css/docs.css">
    <title>Alg0rithm | Docs </title>
</head>
<body>
    
    <div class="d-flex">
        <div class="sidebar p-3" style="width: 250px; height: 100vh; overflow-y: auto; background-color: var(--bg-card); border-right: 1px solid var(--border);">
          <span class="small" style="color: var(--text-gray);">Alg0rithm@1.2</span>
          <a class="d-block text-decoration-none p-2 rounded mt-2" style="background-color: var(--primary); color: var(--bg-light);">start</a>
          
          <div class="accordion accordion-flush mt-2" id="sidebarAccordion">
            <div class="accordion-item" style="background-color: var(--bg-card); border: none;">
              <h2 class="accordion-header">
                <button class="accordion-button collapsed" style="background-color: var(--bg-card); color: var(--text); border: none; box-shadow: none;" type="button" data-bs-toggle="collapse" data-bs-target="#hooks">Languages</button>
              </h2>
              <div id="hooks" class="accordion-collapse collapse" data-bs-parent="#sidebarAccordion">
                <div class="accordion-body p-0">
                  <a href="#web/level1/bubble-sort.md" class="d-block text-decoration-none p-2 ps-4" style="color: var(--text-gray);">web</a>
                  <a href="#games" class="d-block text-decoration-none p-2 ps-4" style="color: var(--text-gray);">games</a>
                </div>
              </div>
            </div>
      
            <div class="accordion-item" style="background-color: var(--bg-card); border: none;">
              <h2 class="accordion-header">
                <button class="accordion-button collapsed" style="background-color: var(--bg-card); color: var(--text); border: none; box-shadow: none;" type="button" data-bs-toggle="collapse" data-bs-target="#components">
                  Components
                </button>
              </h2>
              <div id="components" class="accordion-collapse collapse" data-bs-parent="#sidebarAccordion">
                <div class="accordion-body p-0">
                  <a href="#fragment" class="d-block text-decoration-none p-2 ps-4" style="color: var(--text-gray);">Fragment</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      
        <!-- Main Content -->
        <div class="flex-grow-1 p-4" style="background-color: var(--bg-light);" id="app" >
        </div>
      </div>



      
    <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="js/docs.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
